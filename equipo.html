<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<input type="text" id="buscador" placeholder="Buscar jugador..."/>

<select id="filtroPosicion">

    <option value="Goalkeeper">Arqueros</option>
    <option value="Defender">Defensores</option>
    <option value="Midfielder">Mediocampistas</option>
    <option value="Attacker">Delanteros</option>
</select>
<select id="orden">
    <option value="ninguno">Ordenar...</option>
    <option value="az">A-Z</option>
    <option value="za">Z-A</option>
    <option value="edadAsc">Edad ↑</option>
    <option value="edadDesc">Edad ↓</option>
    <option value="numeroAsc">Número ↑</option>
    <option value="numeroDesc">Número ↓</option>
</select>

<button id="btnLimpiar">Limpiar filtros</button>

<div id="infoEquipo"></div>

    <table id="tablaJugadores">
    <thead>
        <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Posición</th>
            <th>Número</th>
            <th>Edad</th>
        </tr>
    </thead>

    <tbody>

    </tbody>
</table>

<div id="mensajeBusqueda"></div>



    <script type="module" src="src/equipo.js"></script>
