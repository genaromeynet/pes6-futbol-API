<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>futbol-argentino</title>
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
    <h1>⚽ Fútbol</h1>
</header>

<section class="hero">

    <h2>Explorá ligas, equipos y plantillas</h2>

    <p>
        Buscá equipos, guardá favoritos y consultá sus jugadores.
    </p>

</section>

    <!-- FILTROS -->
    <section class="filtros">

      <select id="pais">
        <option value="">Seleccionar país</option>
      </select>

      <select id="liga">
        <option value="">Seleccionar liga</option>
      </select>

      <button id="btnFavoritos">Ver favoritos ⭐</button>

    </section>

     <!-- TABLA DE POSICIONES -->
      <div class="acordeon-posiciones">

    <button id="btnPosiciones">
        Tabla de posiciones ▼
    </button>

    <div id="tablaPosiciones" class="oculto">

    </div>

</div>

    <!-- EQUIPOS (CARDS) -->
    <section class="equipos-section">

      <div id="equipos"></div>

    </section>

  </div>

   <footer class="footer">
    <span id="mensajeFooter">
        Seleccione una liga para visualizar equipos.
    </span>
</footer>

  <script type="module" src="/src/main.js"></script>

</body>

</html>
